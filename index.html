<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Executive Digital Card</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:Arial,sans-serif;
background:#f3f1eb;
}

.card{
position:relative;
width:100%;
max-width:430px;
height:100vh;
margin:auto;
overflow:hidden;
background:linear-gradient(180deg,#f8f7f3,#efede7);
}

/* الخلفيات */

.card:before{
content:"";
position:absolute;
top:-120px;
right:-80px;
width:260px;
height:260px;
border-radius:50%;
background:#dfe4de;
border:2px solid #cfa85b;
}

.card:after{
content:"";
position:absolute;
bottom:-120px;
left:-120px;
width:280px;
height:280px;
border-radius:50%;
background:#2f6b54;
border:2px solid #cfa85b;
}

/* الشعار */

.logo{
width:145px;
position:absolute;
top:28px;
left:25px;
z-index:10;
}

/* المصنع */

.plant{
position:absolute;
top:0;
right:0;
width:230px;
opacity:.20;
border-radius:0 0 0 120px;
}

/* الصورة */

.profile{
position:relative;
z-index:5;
width:145px;
height:145px;
margin:120px auto 20px;
border-radius:50%;
padding:4px;
background:linear-gradient(135deg,#c79d4c,#fff,#d7b36b);
box-shadow:0 15px 25px rgba(0,0,0,.15);
}

.profile img{
width:100%;
height:100%;
border-radius:50%;
object-fit:cover;
}

/* النصوص */

h1{
text-align:center;
font-family:Georgia,serif;
font-size:28px;
color:#103d31;
margin-top:5px;
}

h1 span{
color:#c79d4c;
}

.line{
width:200px;
height:1px;
background:#d0b071;
margin:12px auto;
}

.title{
text-align:center;
font-size:16px;
font-weight:bold;
letter-spacing:6px;
color:#1f5a43;
}

.subtitle{
text-align:center;
margin-top:12px;
font-size:15px;
color:#333;
}

/* الازرار */

.buttons{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:8px;
padding:25px 18px 0;
}

.btn{
background:rgba(255,255,255,.85);
border-radius:14px;
padding:12px 5px;
text-decoration:none;
text-align:center;
color:#17352b;
box-shadow:0 8px 18px rgba(0,0,0,.10);
}

.icon{
font-size:24px;
margin-bottom:8px;
color:#c79d4c;
}

.btn span{
display:block;
font-size:11px;
font-weight:bold;
}

/* الموقع */

.footer{
text-align:center;
margin-top:28px;
font-size:12px;
letter-spacing:5px;
color:#17352b;
}

.footer-icon{
text-align:center;
font-size:20px;
color:#c79d4c;
margin-bottom:8px;
}

</style>
</head>

<body>

<div class="card">

<img src="logo.png" class="logo">

<img src="plant.png" class="plant">

<div class="profile">
<img src="profile.png">
</div>

<h1><span>Eng.</span> Your Name</h1>

<div class="line"></div>

<div class="title">
VICE PRESIDENT
</div>

<div class="subtitle">
Leading Growth & Innovation
</div>

<div class="buttons">

<a class="btn" href="tel:+966500000000">
<div class="icon">📞</div>
<span>CALL</span>
</a>

<a class="btn" href="mailto:email@company.com">
<div class="icon">✉️</div>
<span>EMAIL</span>
</a>

<a class="btn" href="#">
<div class="icon">in</div>
<span>LINKEDIN</span>
</a>

<a class="btn" href="#">
<div class="icon">▣</div>
<span>CONTACT</span>
</a>

</div>

<div class="footer">
<div class="footer-icon">🌐</div>
PETRORABIGH.COM
</div>

</div>

</body>
</html>
