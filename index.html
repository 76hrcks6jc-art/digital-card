<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Faisal Bahidarah | Digital Card</title>

<style>
*{margin:0;padding:0;box-sizing:border-box}

body{
  font-family: Arial, sans-serif;
  background:#f3f1eb;
}

.card{
  position:relative;
  width:100%;
  max-width:430px;
  height:100vh;
  margin:auto;
  overflow:hidden;
  background:linear-gradient(180deg,#faf8f2,#f1eee6);
  color:#073d2d;
}

/* background shapes */
.card::before{
  content:"";
  position:absolute;
  top:-90px;
  right:-80px;
  width:260px;
  height:260px;
  background:#0f513d;
  border-radius:50%;
  border:3px solid #c69a45;
  z-index:1;
}

.card::after{
  content:"";
  position:absolute;
  bottom:-105px;
  left:-100px;
  width:260px;
  height:260px;
  background:#0f513d;
  border-radius:50%;
  border:3px solid #c69a45;
  z-index:1;
}

/* logo */
.logo{
  position:absolute;
  top:30px;
  left:25px;
  width:135px;
  z-index:5;
}

/* plant background */
.plant{
  position:absolute;
  top:95px;
  left:0;
  width:100%;
  height:190px;
  object-fit:cover;
  opacity:.20;
  z-index:2;
}

/* profile image */
.profile{
  position:relative;
  z-index:6;
  width:160px;
  height:160px;
  margin:190px auto 22px;
  border-radius:50%;
  padding:5px;
  background:linear-gradient(135deg,#c69a45,#fff,#e2c47a);
  box-shadow:0 15px 30px rgba(0,0,0,.18);
}

.profile img{
  width:100%;
  height:100%;
  object-fit:cover;
  border-radius:50%;
}

/* names */
.name-ar{
  position:relative;
  z-index:6;
  text-align:center;
  font-size:28px;
  font-weight:800;
  color:#0f513d;
  line-height:1.2;
  margin-top:4px;
}

.name-en{
  position:relative;
  z-index:6;
  text-align:center;
  font-family:Georgia,serif;
  font-size:30px;
  font-weight:bold;
  color:#b88936;
  margin-top:4px;
}

.divider{
  position:relative;
  z-index:6;
  width:210px;
  height:1px;
  background:#c69a45;
  margin:12px auto;
}

.role{
  position:relative;
  z-index:6;
  text-align:center;
  letter-spacing:7px;
  font-size:15px;
  font-weight:bold;
  color:#0f513d;
}

.company{
  position:relative;
  z-index:6;
  text-align:center;
  font-size:20px;
  color:#333;
  margin-top:6px;
}

.sub{
  position:relative;
  z-index:6;
  text-align:center;
  font-size:15px;
  color:#333;
  margin-top:10px;
  line-height:1.4;
}

/* buttons */
.buttons{
  position:relative;
  z-index:6;
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:8px;
  padding:24px 18px 0;
}

.btn{
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  height:92px;
  text-decoration:none;
  background:rgba(255,255,255,.82);
  border:1px solid rgba(255,255,255,.95);
  border-radius:16px;
  box-shadow:0 10px 22px rgba(0,0,0,.12);
  color:#0b3b2d;
}

.icon{
  font-size:26px;
  color:#b88936;
  margin-bottom:8px;
  line-height:1;
}

.btn-title{
  font-size:11px;
  font-weight:800;
  letter-spacing:.5px;
}

.btn-small{
  margin-top:4px;
  font-size:9px;
  color:#334;
  line-height:1.2;
  word-break:break-word;
  padding:0 3px;
}

/* footer */
.footer{
  position:relative;
  z-index:6;
  text-align:center;
  margin-top:30px;
  color:#0f513d;
}

.footer-icon{
  font-size:23px;
  color:#b88936;
  margin-bottom:7px;
}

.website{
  letter-spacing:5px;
  font-size:13px;
  font-weight:500;
}

/* mobile smaller screens */
@media(max-height:760px){
  .plant{height:165px}
  .profile{
    width:145px;
    height:145px;
    margin-top:170px;
    margin-bottom:18px;
  }
  .name-ar{font-size:25px}
  .name-en{font-size:27px}
  .buttons{padding-top:18px}
  .btn{height:82px}
  .footer{margin-top:22px}
}
</style>
</head>

<body>

<div class="card">

  <img src="logo.PNG" class="logo" alt="Petro Rabigh Logo">

  <img src="plant.PNG" class="plant" alt="Petro Rabigh Plant">

  <div class="profile">
    <img src="profile.PNG" alt="Faisal Bahidarah">
  </div>

  <div class="name-ar">فيصل بن عبدالله باهيداره</div>
  <div class="name-en">Faisal Bahidarah</div>

  <div class="divider"></div>

  <div class="role">VICE PRESIDENT</div>
  <div class="company">Petro Rabigh</div>

  <div class="sub">
    Executive Leadership<br>
    Strategy & Growth
  </div>

  <div class="buttons">

    <a class="btn" href="tel:+966505530015">
      <div class="icon">☎</div>
      <div class="btn-title">CALL</div>
      <div class="btn-small">+966 505 530 015</div>
    </a>

    <a class="btn" href="mailto:bahidafa@petrorabigh.com">
      <div class="icon">✉</div>
      <div class="btn-title">EMAIL</div>
      <div class="btn-small">bahidafa@<br>petrorabigh.com</div>
    </a>

    <a class="btn" href="https://sa.linkedin.com/in/faisal-bahidarah" target="_blank">
      <div class="icon">in</div>
      <div class="btn-title">LINKEDIN</div>
      <div class="btn-small">View Profile</div>
    </a>

    <a class="btn" href="faisal-bahidarah.vcf">
      <div class="icon">◉</div>
      <div class="btn-title">SAVE</div>
      <div class="btn-small">Add Contact</div>
    </a>

  </div>

  <div class="footer">
    <div class="footer-icon">◎</div>
    <div class="website">PETRORABIGH.COM</div>
  </div>

</div>

</body>
</html>
