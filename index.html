<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Faisal Bahidarah | Digital Card</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

html,body{
  width:100%;
  min-height:100%;
}

body{
  font-family:Arial, sans-serif;
  background:#f4f1ea;
  color:#103d31;
}

.card{
  position:relative;
  width:100%;
  max-width:430px;
  min-height:100vh;
  margin:auto;
  overflow:hidden;
  background:linear-gradient(180deg,#fbfaf7 0%,#f2efe8 100%);
}

/* Background plant */
.plant-bg{
  position:absolute;
  top:75px;
  left:0;
  width:100%;
  height:210px;
  object-fit:cover;
  opacity:2;
  z-index:0;
}

/* Soft header overlay */
.header-soft{
  position:absolute;
  top:0;
  left:0;
  width:100%;
  height:260px;
  background:linear-gradient(180deg,rgba(255,255,255,.88),rgba(255,255,255,.15));
  z-index:1;
}

/* Top right green curve */
.top-curve{
  position:absolute;
  top:-105px;
  right:-105px;
  width:230px;
  height:230px;
  border-radius:50%;
  background:#0f5a43;
  border:2px solid #c99b45;
  z-index:2;
}

/* Bottom left green curve */
.bottom-curve{
  position:absolute;
  bottom:-115px;
  left:-115px;
  width:230px;
  height:230px;
  border-radius:50%;
  background:#0f5a43;
  border:2px solid #c99b45;
  z-index:2;
}

/* Logo */
.logo{
  position:relative;
  z-index:4;
  width:128px;
  margin:28px 0 0 24px;
  display:block;
}

/* Content */
.content{
  position:relative;
  z-index:4;
  padding:0 18px 24px;
  text-align:center;
}

/* Profile photo */
.profile{
  width:165px;
  height:165px;
  margin:95px auto 18px;
  border-radius:50%;
  padding:5px;
  background:linear-gradient(135deg,#c99b45,#fff1c9,#d9b765);
  box-shadow:0 16px 28px rgba(0,0,0,.16);
}

.profile img{
  width:100%;
  height:100%;
  object-fit:cover;
  border-radius:50%;
  display:block;
  border:4px solid #fff;
}

/* Names */
.name-ar{
  font-size:27px;
  font-weight:800;
  color:#0f5a43;
  line-height:1.35;
  direction:rtl;
  margin-bottom:2px;
}

.name-en{
  font-family:Georgia,serif;
  font-size:31px;
  font-weight:700;
  color:#b98734;
  line-height:1.15;
  margin-bottom:12px;
}

.divider{
  width:205px;
  height:1px;
  background:linear-gradient(90deg,transparent,#c99b45,transparent);
  margin:0 auto 12px;
}

/* Position */
.position-main{
  font-size:16px;
  font-weight:800;
  letter-spacing:5px;
  color:#0f5a43;
  margin-bottom:6px;
}

.position-sub{
  font-size:17px;
  font-weight:700;
  letter-spacing:2px;
  color:#b98734;
  margin-bottom:5px;
}

.company{
  font-size:18px;
  color:#2f3437;
  margin-bottom:26px;
}

/* Buttons */
.buttons{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:10px;
  margin:0 auto 36px;
}

.btn{
  text-decoration:none;
  color:#0f352b;
  background:rgba(255,255,255,.82);
  border:1px solid rgba(255,255,255,.95);
  border-radius:17px;
  min-height:96px;
  padding:13px 6px 10px;
  box-shadow:0 12px 24px rgba(0,0,0,.10);
  backdrop-filter:blur(10px);
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
}

.icon{
  width:28px;
  height:28px;
  margin-bottom:8px;
  color:#b98734;
}

.btn.call .icon{
  color:#0f5a43;
}

.btn-title{
  font-size:12px;
  font-weight:800;
  letter-spacing:.7px;
  margin-bottom:3px;
}

.btn-small{
  font-size:10.5px;
  color:#4b4f52;
  line-height:1.25;
  word-break:break-word;
}

/* Footer */
.footer-logo{
  width:70px;
  margin:0 auto 10px;
  opacity:.92;
}

.website{
  font-size:13px;
  letter-spacing:6px;
  color:#0f5a43;
  font-weight:600;
  margin-bottom:10px;
}

/* Hidden vCard download */
.hidden-link{
  display:none;
}

/* Mobile height adjustment */
@media (max-height:760px){
  .logo{
    width:115px;
    margin-top:20px;
  }

  .plant-bg{
    height:180px;
  }

  .profile{
    width:145px;
    height:145px;
    margin-top:78px;
    margin-bottom:14px;
  }

  .name-ar{
    font-size:24px;
  }

  .name-en{
    font-size:28px;
  }

  .company{
    margin-bottom:18px;
  }

  .btn{
    min-height:86px;
    border-radius:15px;
    padding:10px 4px;
  }

  .icon{
    width:24px;
    height:24px;
  }

  .website{
    font-size:12px;
  }
}
</style>
</head>

<body>

<div class="card">

  <img src="Logo.PNG" class="logo" alt="Petro Rabigh Logo">

  <div class="content">

    <div class="profile">

        </svg>
        <div class="btn-title">EMAIL</div>

      <a class="btn" href="https://sa.linkedin.com/in/faisal-bahidarah" target="_blank">
        <svg class="icon" viewBox="0 0 24 24" fill="currentColor">
          <path d="M4.98 3.5C4.98 4.88 3.86 6 2.5 6S0 4.88 0 3.5 1.12 1 2.5 1s2.48 1.12 2.48 2.5zM.5 8h4V24h-4V8zm7.5 0h3.8v2.2h.1c.5-1 1.9-2.5 4-2.5 4.3 0 5.1 2.8 5.1 6.5V24h-4v-8.6c0-2.1 0-4.7-2.9-4.7s-3.3 2.2-3.3 4.5V24h-4V8z"/>

      <a class="btn" href="faisal.vcf">
        <svg class="icon" viewBox="0 0 24 24" fill="currentColor">
          <path d="M20 2H4c-1.1 0-2 .9-2 2v16c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zM8 6.5c1.38 0 2.5 1.12 2.5 2.5S9.38 11.5 8 11.5 5.5 10.38 5.5 9 6.62 6.5 8 6.5zM13 17H3v-.75C3 14.6 6.33 13.7 8 13.7s5 .9 5 2.55V17zm8-1h-6v-2h6v2zm0-4h-6v-2h6v2zm0-4h-6V6h6v2z"/>
        </svg>
        <div class="btn-title">SAVE</div>
        <div class="btn-small"></div>
      </a>

    </div>

    <img src="Logo.PNG" class="footer-logo" alt="Petro Rabigh Logo">
    <div class="website">PETRORABIGH.COM</div>

  </div>
</div>

<script>
function downloadVCard(){
  const vcard = `BEGIN:VCARD
VERSION:3.0
N:Bahidarah;Faisal;;;
FN:Faisal Bahidarah
ORG:Petro Rabigh
TITLE:Senior Vice President, Manufacturing
TEL;TYPE=CELL:+966505530015
EMAIL:bahidafa@petrorabigh.com
URL:https://sa.linkedin.com/in/faisal-bahidarah
END:VCARD`;

  const blob = new Blob([vcard], { type: "text/vcard" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  a.download = "Faisal-Bahidarah.vcf";
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}
</script>

</body>
</html>
