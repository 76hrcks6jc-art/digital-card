<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Executive Digital Card</title>

<style>
*{box-sizing:border-box}

body{
  margin:0;
  font-family: Arial, sans-serif;
  background:#e9ebe6;
  color:#17352b;
}

.card{
  min-height:100vh;
  max-width:430px;
  margin:auto;
  padding:34px 24px;
  position:relative;
  overflow:hidden;
  background:linear-gradient(180deg,#f8f7f2,#ece8df);
}

.card:before{
  content:"";
  position:absolute;
  top:-80px;
  right:-130px;
  width:360px;
  height:360px;
  border-radius:50%;
  background:rgba(47,96,77,.18);
  border:2px solid #c8a45d;
}

.card:after{
  content:"";
  position:absolute;
  bottom:-130px;
  left:-120px;
  width:360px;
  height:360px;
  border-radius:50%;
  background:#1f5a43;
  opacity:.9;
  border:2px solid #c8a45d;
}

.logo{
  width:150px;
  position:relative;
  z-index:2;
}

.plant{
  position:absolute;
  top:105px;
  right:-35px;
  width:260px;
  height:210px;
  object-fit:cover;
  opacity:.22;
  border-radius:120px 0 0 120px;
}

.profile{
  position:relative;
  z-index:2;
  width:210px;
  height:210px;
  margin:120px auto 32px;
  border-radius:50%;
  padding:6px;
  background:linear-gradient(135deg,#d8b56c,#fff,#c79b45);
  box-shadow:0 18px 35px rgba(0,0,0,.18);
}

.profile img{
  width:100%;
  height:100%;
  object-fit:cover;
  border-radius:50%;
}

h1{
  position:relative;
  z-index:2;
  text-align:center;
  font-size:38px;
  margin:0;
  font-family:Georgia,serif;
  color:#11392d;
}

h1 span{
  color:#b58b45;
}

.line{
  width:240px;
  height:1px;
  background:#c8a45d;
  margin:16px auto;
  position:relative;
  z-index:2;
}

.title{
  position:relative;
  z-index:2;
  text-align:center;
  letter-spacing:8px;
  font-size:17px;
  color:#1f5a43;
  font-weight:bold;
}

.subtitle{
  position:relative;
  z-index:2;
  text-align:center;
  font-size:18px;
  margin-top:14px;
  color:#263b3b;
}

.buttons{
  position:relative;
  z-index:2;
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:14px;
  margin-top:38px;
}

.btn{
  text-decoration:none;
  color:#142f2a;
  background:rgba(255,255,255,.72);
  border-radius:18px;
  padding:22px 10px;
  text-align:center;
  box-shadow:0 12px 25px rgba(0,0,0,.12);
  border:1px solid rgba(255,255,255,.9);
}

.icon{
  font-size:32px;
  color:#b58b45;
  margin-bottom:10px;
}

.btn b{
  display:block;
  font-size:15px;
  letter-spacing:1px;
}

.footer{
  position:relative;
  z-index:2;
  text-align:center;
  margin-top:70px;
  letter-spacing:6px;
  font-size:14px;
  color:#17352b;
}

</style>
</head>

<body>

<div class="card">

  <img class="logo" src="logo.png" alt="Petro Rabigh Logo">

  <img class="plant" src="plant.jpg" alt="Plant">

  <div class="profile">
    <img src="profile.jpg" alt="Executive Photo">
  </div>

  <h1><span>Eng.</span> Your Name</h1>

  <div class="line"></div>

  <div class="title">VICE PRESIDENT</div>

  <div class="subtitle">Leading Growth & Innovation</div>

  <div class="buttons">
    <a class="btn" href="tel:+966500000000">
      <div class="icon">☎</div>
      <b>CALL</b>
    </a>

    <a class="btn" href="mailto:email@company.com">
      <div class="icon">✉</div>
      <b>EMAIL</b>
    </a>

    <a class="btn" href="#">
      <div class="icon">in</div>
      <b>LINKEDIN</b>
    </a>

    <a class="btn" href="#">
      <div class="icon">▣</div>
      <b>SAVE CONTACT</b>
    </a>
  </div>

  <div class="footer">PETRORABIGH.COM</div>

</div>

</body>
</html>
